<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CV Incrível{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #343541;
            --sidebar-bg: #202123;
            --chat-bg: #444654;
            --accent-color: #10A37F;
            --text-color: #ECECF1;
            --muted-color: #8E8EA0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #3E3F4B;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-brand {
            padding: 1.5rem 1.25rem;
            border-bottom: 1px solid #3E3F4B;
        }

        .sidebar-brand h3 {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-color);
            margin: 0;
        }

        .sidebar-brand small {
            color: var(--muted-color);
            font-size: 0.8rem;
        }

        .sidebar-nav {
            padding: 1rem 0.75rem;
            flex: 1;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            color: var(--muted-color);
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
        }

        .sidebar-nav .nav-item i {
            font-size: 1.2rem;
            width: 1.5rem;
            text-align: center;
        }

        .sidebar-nav .nav-item:hover {
            background-color: #3E3F4B;
            color: var(--text-color);
        }

        .sidebar-nav .nav-item.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* ─── Main Content ─── */
        .content {
            flex: 1;
            min-width: 0;
            padding: 2rem 1.5rem;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-weight: 700;
            color: var(--text-color);
        }

        .page-header p {
            color: var(--muted-color);
        }

        .upload-card {
            background-color: var(--sidebar-bg);
            border: 1px solid #3E3F4B;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .alert-custom {
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .spinner-border {
            color: var(--accent-color);
        }

        </style>
</head>
<body>
    {% block extra_styles %}{% endblock %}
    {% if user.is_authenticated %}
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h3><i class="bi bi-file-earmark-text"></i> CV Incrível</h3>
            <small>Resume Toolkit</small>
        </div>
        <div class="sidebar-nav">
            {% if not has_resume %}
            <a href="{% url 'index' %}" class="nav-item {% if active_page == 'extract' %}active{% endif %}">
                <i class="bi bi-upload"></i> Profile Setup
            </a>
            {% endif %}
            <a href="{% url 'profile' %}" class="nav-item {% if active_page == 'profile' %}active{% endif %}">
                <i class="bi bi-person-gear"></i> My Profile
            </a>
            <a href="{% url 'generate_cv' %}" class="nav-item {% if active_page == 'generate' %}active{% endif %}">
                <i class="bi bi-stars"></i> Generate CV
            </a>
        </div>
        <div class="sidebar-nav border-top border-secondary pt-3 mt-auto">
            <div class="nav-item d-flex align-items-center gap-2 text-muted small px-3 mb-2">
                <i class="bi bi-person-circle"></i>
                <span>{{ user.email }}</span>
            </div>
            <a href="{% url 'logout' %}" class="nav-item">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </nav>
    {% endif %}

    <!-- Main Content -->
    <main class="content"{% if not user.is_authenticated %} style="padding: 0;"{% endif %}>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
